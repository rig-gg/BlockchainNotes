<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NoteChain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="shell">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">

    <div class="sidebar-top">
      <div class="wordmark">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="1" y="1" width="7" height="7" rx="2" fill="#f59e0b"/>
          <rect x="10" y="1" width="7" height="7" rx="2" fill="#f59e0b" opacity=".5"/>
          <rect x="1" y="10" width="7" height="7" rx="2" fill="#f59e0b" opacity=".5"/>
          <rect x="10" y="10" width="7" height="7" rx="2" fill="#f59e0b"/>
        </svg>
        <span>NoteChain</span>
      </div>
      <div id="chainBadge" class="chain-badge secured">Secured</div>
    </div>

    <button class="new-btn" onclick="focusCompose()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      New note
    </button>

    <div class="list-label">Notes</div>
    <nav class="note-nav" id="noteNav"></nav>

  </aside>

  <!-- ── Main ── -->
  <div class="main">

    <!-- Empty state -->
    <div class="splash" id="splash">
      <div class="splash-icon">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <rect x="4" y="4" width="14" height="14" rx="3" fill="#f59e0b" opacity=".3"/>
          <rect x="22" y="4" width="14" height="14" rx="3" fill="#f59e0b" opacity=".15"/>
          <rect x="4" y="22" width="14" height="14" rx="3" fill="#f59e0b" opacity=".15"/>
          <rect x="22" y="22" width="14" height="14" rx="3" fill="#f59e0b" opacity=".3"/>
        </svg>
      </div>
      <p class="splash-head">Select a note</p>
      <p class="splash-sub">Or write something new below.</p>
    </div>

    <!-- Note view -->
    <article class="note-view" id="noteView" style="display:none">
      <div class="note-view-inner">
        <header class="note-header">
          <div class="note-header-left">
            <span class="note-timestamp" id="noteTimestamp"></span>
            <span id="noteStatusPill" class="status-pill"></span>
          </div>
          <div class="note-header-right" id="noteActions"></div>
        </header>

        <div class="note-content" id="noteContent"></div>

        <!-- Chain info drawer -->
        <div class="drawer">
          <button class="drawer-trigger" id="drawerTrigger" onclick="toggleDrawer()">
            <span class="drawer-label">
              <span class="drawer-icon">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                  <rect x=".5" y=".5" width="4" height="4" rx="1" stroke="currentColor"/>
                  <rect x="7.5" y=".5" width="4" height="4" rx="1" stroke="currentColor"/>
                  <rect x=".5" y="7.5" width="4" height="4" rx="1" stroke="currentColor"/>
                  <rect x="7.5" y="7.5" width="4" height="4" rx="1" stroke="currentColor"/>
                </svg>
              </span>
              Block metadata
            </span>
            <svg class="drawer-caret" id="drawerCaret" width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="drawer-body" id="drawerBody">
            <div class="meta-grid" id="metaGrid"></div>
          </div>
        </div>
      </div>

    </article>

    <!-- Compose -->
    <div class="compose">
        <textarea
                id="noteInput"
                class="compose-textarea"
                placeholder="What's on your mind?"
                rows="1"
                oninput="autoResize(this)"
        ></textarea>
      <button class="compose-generate" id="generateBtn" onclick="generateNote()">Generate</button>
      <button class="compose-save" onclick="addNote()">
        Save
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5h9M7.5 2.5l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

  </div>
</div>

<!-- Tamper modal -->
<div class="overlay" id="overlay" style="display:none" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-eyebrow">Simulation</div>
    <h2 class="modal-title">Tamper with note #<span id="modalIdx"></span></h2>
    <p class="modal-body">The stored hash won't be recalculated. The chain will flag this block as compromised.</p>
    <label class="modal-label">Replacement content</label>
    <input class="modal-input" id="tamperInput" type="text" value="[TAMPERED DATA]" />
    <div class="modal-row">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" onclick="confirmTamper()">Tamper block</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
