<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NoteChain</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="app-logo">
        <span class="logo-icon">📝</span>
        <span class="app-name">NoteChain</span>
      </div>
      <div id="chainPill" class="chain-pill valid">● Secured</div>
    </div>

    <button class="new-note-btn" onclick="focusCompose()">+ New Note</button>

    <p class="sidebar-label">All Notes</p>
    <div class="note-list" id="noteList">
      <p class="empty-msg">No notes yet.</p>
    </div>
  </aside>

  <!-- Main content -->
  <main class="content">

    <!-- Empty state -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📋</div>
      <p class="empty-title">No note selected</p>
      <p class="empty-sub">Pick a note from the sidebar or create a new one.</p>
    </div>

    <!-- Note view -->
    <div class="note-view" id="noteView" style="display:none;">

      <div class="note-view-header">
        <div class="note-view-meta" id="noteMeta"></div>
        <div class="note-view-actions">
          <button class="icon-btn tamper-btn" id="tamperBtn" onclick="openTamperModal()" title="Tamper this note">⚠ Tamper</button>
          <button class="icon-btn restore-btn" id="restoreBtn" onclick="restoreBlock()" title="Restore this note">↩ Restore</button>
        </div>
      </div>

      <div class="note-body" id="noteBody"></div>

      <!-- Blockchain info accordion -->
      <div class="chain-accordion">
        <button class="accordion-toggle" onclick="toggleAccordion()">
          <span>🔗 Blockchain Info</span>
          <span class="accordion-arrow" id="accordionArrow">▸</span>
        </button>
        <div class="accordion-body" id="accordionBody" style="display:none;">
          <div class="chain-grid" id="chainGrid"></div>
        </div>
      </div>

    </div>

    <!-- Compose bar -->
    <div class="compose-bar">
      <textarea
        id="noteInput"
        class="compose-input"
        placeholder="Write a new note…"
        rows="1"
        oninput="autoResize(this)"
      ></textarea>
      <button class="compose-btn" onclick="addNote()">Save Note</button>
    </div>

  </main>

  <!-- Tamper modal -->
  <div id="modalOverlay" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-icon">⚠️</span>
        <div>
          <h3>Tamper Note</h3>
          <p class="modal-sub">This simulates a blockchain attack on note #<span id="modalBlockIndex"></span>.</p>
        </div>
      </div>
      <label>Replace note content with:</label>
      <input type="text" id="tamperInput" value="[TAMPERED DATA]" />
      <p class="modal-hint">The hash will NOT be recalculated — the chain will detect it.</p>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-tamper-confirm" onclick="confirmTamper()">Tamper ⚠</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
